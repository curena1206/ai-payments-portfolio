<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI Payments Strategy Framework — Carlos Ureña</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // Preserves the path so React Router can handle it client-side
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var url = '/?p=' + encodeURIComponent(path.slice(1)) + (search ? '&q=' + search.slice(1) : '') + hash;
      window.location.replace(url);
    </script>
  </head>
  <body></body>
</html>
